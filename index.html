<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gpiplay Holoprint</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script><style>
:root{
--bg:#ffffff;
--card:#f5f5f5;
--text:#111;
--accent:#38bdf8; /* sky blue */
--header:#ffffff;
}

body.dark{
--bg:#0b0b0b;
--card:#121212;
--text:#ffffff;
--header:#000000;
}

*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:var(--text);transition:.25s}

header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--header);border-bottom:1px solid #1f1f1f;position:sticky;top:0;z-index:10}

.logo{display:flex;align-items:center;gap:10px;font-weight:700}
.logo img{height:36px}

.top-links{display:flex;gap:10px}

.icon-btn{width:38px;height:38px;border-radius:12px;background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s}
.icon-btn:hover{transform:scale(1.08)}

.container{padding:20px;max-width:1200px;margin:auto}

.tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 14px;background:var(--card);border-radius:999px;cursor:pointer}
.tab.active{background:var(--accent);color:white}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

.card{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid #1f1f1f;transition:.25s}
.card:hover{transform:translateY(-5px)}

.preview{height:180px;background:#000}
.preview img{width:100%;height:100%;object-fit:cover}
.viewer{width:100%;height:180px}

.content{padding:12px}
.title{font-weight:600;margin-bottom:8px}

.buttons{display:flex;gap:8px;flex-wrap:wrap}

.btn{flex:1;text-align:center;padding:8px;background:#1a1a1a;color:white;border-radius:8px;cursor:pointer;font-size:13px}
.btn.primary{background:var(--accent)}

.about{max-width:700px;margin:auto;line-height:1.6}
.footer{padding:30px;text-align:center;opacity:.6}

/* modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:50}

.modal-box{width:min(1000px,95%);background:#000;border-radius:16px;overflow:hidden}

.modal img{width:100%;display:block}

.close{position:absolute;top:20px;right:20px;background:#000;color:#fff;padding:6px 10px;border-radius:8px;cursor:pointer}

.fullscreen{position:absolute;top:20px;right:100px;background:#000;color:#fff;padding:6px 10px;border-radius:8px;cursor:pointer}

</style></head>
<body class="dark"><header>
<div class="logo">
<img src="logo.png">
<span>Gpiplay Holoprint</span>
</div><div class="top-links">
<div class="icon-btn" onclick="toggleMode()">🌙</div><div class="icon-btn" onclick="openTG()">
<svg viewBox="0 0 240 240" width="20" height="20">
<circle cx="120" cy="120" r="120" fill="#229ED9"/>
<path d="M179 78 67 121c-5 2-5 6-1 7l29 9 11 35c1 4 3 5 6 5 2 0 3-1 5-3l15-15 31 23c6 3 10 1 11-5l20-95c2-7-3-10-9-7z" fill="#fff"/>
</svg>
</div><div class="icon-btn" onclick="openTT()">
<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
<path d="M16 3c1.2 2.1 2.8 3.6 5 4v3c-1.7 0-3.3-.5-5-1.4V16a5 5 0 1 1-5-5c.4 0 .8 0 1.1.1v3c-.3-.1-.7-.2-1.1-.2a2 2 0 1 0 2 2V3h3z"/>
</svg>
</div>
</div>
</header><div class="container">
<div class="tabs">
<div class="tab active" onclick="showTab('home')">Home</div>
<div class="tab" onclick="showTab('medieval')">Medieval</div>
<div class="tab" onclick="showTab('redstone')">Redstone</div>
<div class="tab" onclick="showTab('farm')">Farm</div>
<div class="tab" onclick="showTab('about')">About</div>
</div><div id="home" class="page"><div class="grid" id="homeGrid"></div></div>
<div id="medieval" class="page" style="display:none"><div class="grid" id="medievalGrid"></div></div>
<div id="redstone" class="page" style="display:none"><div class="grid" id="redstoneGrid"></div></div>
<div id="farm" class="page" style="display:none"><div class="grid" id="farmGrid"></div></div><div id="about" class="page" style="display:none">
<div class="about">
<h2>About</h2>
<p>Download Holoprint builds with PNG preview and interactive 3D viewer.</p>
</div>
</div>
</div><div class="modal" id="previewModal">
<div class="close" onclick="closePreview()">Close</div>
<div class="fullscreen" onclick="fullscreenPreview()">Fullscreen</div>
<div class="modal-box" id="previewContent"></div>
</div><div class="footer">Gpiplay Holoprint</div><script>
function toggleMode(){document.body.classList.toggle('dark')}
function openTG(){window.open("https://t.me/gpiplayholoprint")}
function openTT(){window.open("https://tiktok.com/@gpiplay_main")}

function showTab(id){
document.querySelectorAll('.page').forEach(p=>p.style.display='none')
document.getElementById(id).style.display='block'
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
event.target.classList.add('active')
}

const posts=[
{
title:"GreenRoof House",
png:"greenroofhouse.png",
glb:"greenroofhouse.glb",
holo:"greenroofhouse.holoprint.mcpack",
function:"greenroofhouse.mcpack",
category:"home"
}
]

function createCard(p){
const card=document.createElement('div')
card.className='card'

card.innerHTML=`
<div class="preview"><img src="${p.png}"></div>
<div class="viewer"></div>
<div class="content">
<div class="title">${p.title}</div>
<div class="buttons">
<div class="btn" onclick="preview('${p.png}','${p.glb}')">Preview</div>
<div class="btn primary" onclick="download('${p.holo}')">Holoprint</div>
<div class="btn" onclick="download('${p.function}')">Function</div>
</div>
</div>`

setTimeout(()=>loadGLB(card.querySelector('.viewer'),p.glb,true),100)
return card
}

function preview(img,glb){
const box=document.getElementById('previewContent')
box.innerHTML=`<img src="${img}"><div id="preview3d" style="height:400px"></div>`
document.getElementById('previewModal').style.display='flex'
setTimeout(()=>loadGLB(document.getElementById('preview3d'),glb,true),50)
}

function fullscreenPreview(){
const modal=document.getElementById('previewModal')
if(!document.fullscreenElement){
modal.requestFullscreen()
}else{
document.exitFullscreen()
}
}

function closePreview(){document.getElementById('previewModal').style.display='none'}

function loadGLB(el,url,controlsEnabled){
const scene=new THREE.Scene()
const camera=new THREE.PerspectiveCamera(45,el.clientWidth/el.clientHeight,.1,1000)
const renderer=new THREE.WebGLRenderer({alpha:true,antialias:true})
renderer.setSize(el.clientWidth,el.clientHeight)
el.appendChild(renderer.domElement)

const light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,5,5)
scene.add(light)

const loader=new THREE.GLTFLoader()
loader.load(url,(gltf)=>scene.add(gltf.scene))

camera.position.set(2,2,5)

let controls
if(controlsEnabled){
controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true
controls.enableZoom=true
controls.enablePan=false
}

function animate(){
requestAnimationFrame(animate)
if(controls) controls.update()
renderer.render(scene,camera)
}
animate()
}

function download(file){window.open(file)}

function load(){
posts.forEach(p=>{
const card=createCard(p)
if(p.category==="medieval") document.getElementById('medievalGrid').appendChild(card)
else if(p.category==="redstone") document.getElementById('redstoneGrid').appendChild(card)
else if(p.category==="farm") document.getElementById('farmGrid').appendChild(card)
else document.getElementById('homeGrid').appendChild(card)
})
}

load()
</script></body>
</html>
